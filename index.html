<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZARREL — Diseñamos y desarrollamos experiencias digitales que impulsan el futuro. Páginas web, apps móviles, identidad visual y soluciones tecnológicas.">
  <meta name="theme-color" content="#fafafa">

  <title>ZARREL — Experiencias Digitales</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- Google Fonts: Manrope (primary) with Inter fallback -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Modular CSS (order matters) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!--
    ============================================================
    ZARREL — Phase 1: Floating card hero (AKQA-inspired layout)
    ============================================================
    Composition: white page, centered nav above a rounded video
    card. The card clips the hero video via overflow:hidden.
    Video asset lives at /assets/videos/hero.mp4.
  -->

  <div class="page">

    <!-- Navigation — centered above the hero card, light glass -->
    <header class="navbar reveal" id="navbar" role="banner">
      <a href="/" class="navbar__logo" aria-label="ZARREL — Inicio">ZARREL</a>
      <nav aria-label="Navegación principal">
        <ul class="navbar__links">
          <li><a href="#servicios" class="navbar__link">Servicios</a></li>
          <li><a href="#expertise" class="navbar__link">Expertise</a></li>
          <li><a href="#blog" class="navbar__link">Blog</a></li>
          <li><a href="#contacto" class="navbar__link">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <!-- Hero — rounded floating card that clips the video -->
    <main class="hero reveal" id="hero" style="--reveal-delay: 0.1s">

      <!-- Fallback layer (CSS gradient + static image). Painted beneath the
           video; main.js reveals the image on video error/missing file. -->
      <div class="hero__fallback" aria-hidden="true"></div>

      <!--
        Background video — decorative, autoplay + muted + loop + playsinline.
        preload="metadata" keeps first paint fast. object-fit:cover + the
        card's overflow:hidden keep it clipped to the rounded corners.
      -->
      <video
        class="hero__video"
        id="hero-video"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
        width="1920"
        height="1080"
        poster="assets/images/hero-fallback.svg"
        aria-hidden="true"
      >
        <source src="assets/videos/hero.mp4" type="video/mp4">
      </video>

      <!-- Readability overlay -->
      <div class="hero__overlay" aria-hidden="true"></div>

      <!-- Hero content — left-aligned, vertically centered inside card -->
      <section class="hero__content" aria-labelledby="hero-heading">

        <h1 class="hero__headline reveal" id="hero-heading"
            style="--reveal-delay: 0.25s">
          Diseñamos y desarrollamos experiencias digitales que impulsan el futuro.
        </h1>

        <p class="hero__subtitle reveal" style="--reveal-delay: 0.4s">
          Creamos páginas web, aplicaciones móviles, identidad visual y soluciones
          tecnológicas para empresas modernas.
        </p>

        <div class="hero__actions reveal" style="--reveal-delay: 0.55s">
          <a href="#servicios" class="btn btn--primary">Ver Servicios</a>
          <a href="#proyectos" class="btn btn--ghost">Nuestros Proyectos</a>
        </div>

      </section>

    </main>

  </div>

  <!-- Modular JS (defer = non-blocking) -->
  <script src="js/navbar.js" defer></script>
  <script src="js/animations.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
