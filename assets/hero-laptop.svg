<svg width="640" height="430" viewBox="0 0 640 430" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="lidMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4256"/>
      <stop offset="100%" stop-color="#161c2e"/>
    </linearGradient>
    <linearGradient id="baseMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7cdd8"/>
      <stop offset="45%" stop-color="#9aa2b3"/>
      <stop offset="100%" stop-color="#7d859a"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13234f"/>
      <stop offset="100%" stop-color="#0A1128"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="22" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- lid / screen bezel -->
    <rect x="60" y="18" width="520" height="330" rx="14" fill="url(#lidMetal)"/>
    <!-- screen -->
    <rect x="78" y="36" width="484" height="294" rx="4" fill="url(#screenBg)"/>

    <!-- camera dot -->
    <circle cx="320" cy="27" r="2.4" fill="#4b5568"/>

    <!-- screen content -->
    <g transform="translate(112,70)">
      <rect x="0" y="0" width="22" height="22" rx="6" fill="url(#btnGrad)"/>
      <text x="32" y="16" fill="#ffffff" font-size="15" font-weight="700" letter-spacing="0.5">ZARREL</text>

      <text x="0" y="70" fill="#ffffff" font-size="21" font-weight="600">Soluciones digitales</text>
      <text x="0" y="98" fill="#ffffff" font-size="21" font-weight="600">a la medida de</text>
      <text x="0" y="126" fill="#ffffff" font-size="21" font-weight="600">tus ideas</text>

      <rect x="0" y="152" width="112" height="34" rx="8" fill="url(#btnGrad)"/>
      <text x="18" y="174" fill="#ffffff" font-size="13" font-weight="600">Hablemos  →</text>
    </g>

    <!-- base / keyboard deck -->
    <path d="M20,348 L620,348 L600,388 Q596,398 584,398 L56,398 Q44,398 40,388 Z" fill="url(#baseMetal)"/>
    <rect x="270" y="352" width="100" height="6" rx="3" fill="#6b7386" opacity="0.6"/>
  </g>
</svg>
